<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Conversor de moedas online">
  <title>Conversor de Moedas</title>
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Container centralizado -->
  <div class="container d-flex align-items-center justify-content-center min-vh-100">
    <!-- Card do conversor -->
    <div class="card shadow p-4 w-100" style="max-width: 500px;">
      <!-- Cabeçalho do app -->
      <div class="text-center mb-4">
        <h2 class="fw-bold">
          <i class="bi bi-cash-stack"></i>
          Conversor
        </h2>
        <small class="text-muted">Conversão em tempo real</small>
      </div>

      <!-- FORMULÁRIO DE CONVERSÃO -->
      <form id="converterForm">
        <!-- INPUT DE VALOR -->
        <div class="mb-3">
          <label class="form-label">
            <i class="bi bi-coin"></i> Valor
          </label>
          <!-- Campo numérico para entrada do usuário -->
          <input type="number" id="amount" class="form-control" placeholder="Digite o valor" required>
        </div>

        <!-- MOEDA DE -->
        <div class="mb-3">
          <label class="form-label">
            <i class="bi bi-arrow-down-up"></i> De
          </label>
          <!-- Select da moeda -->
          <select id="fromCurrency" class="form-select"></select>
        </div>

        <!-- MOEDA PARA -->
        <div class="mb-3">
          <label class="form-label">
            <i class="bi bi-arrow-repeat"></i> Para
          </label>
          <!-- Select da moeda -->
          <select id="toCurrency" class="form-select"></select>
        </div>

        <!-- BOTÃO DE CONVERSÃO -->
        <button class="btn btn-primary w-100" id="convertBtn">
          <i class="bi bi-arrow-left-right"></i>
          Converter
        </button>
      </form>

      <!-- ÁREA DE RESULTADO -->
      <div class="mt-4 text-center">
        <!-- Resultado da conversão -->
        <h5 id="result"></h5>
        <!-- Taxa usada na conversão -->
        <small id="rateInfo" class="text-muted d-block"></small>
        <!-- Última atualização da API -->
        <small id="lastUpdated" class="text-muted"></small>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
